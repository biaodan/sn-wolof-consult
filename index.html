<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potvrda</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { text-align: center; width: 88%; max-width: 350px; background: white; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .avatar { width: 80px; height: 80px; background: #e0e0e0; border-radius: 50%; margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; font-size: 40px; }
        .dept { font-size: 14px; color: #888; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #333; }
        .text { font-size: 15px; color: #606770; line-height: 1.5; margin-bottom: 25px; }
        .btn { display: block; background: #25D366; color: white; text-decoration: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 17px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <!-- 人力资源部头像 -->
        <div class="avatar">👤</div>
        <div class="dept">Sektor za ljudske resurse</div>
        <div class="title">Uspešno dodeljen!</div>
        <div class="text">
            Vaša prijava je primljena. Kako bismo nastavili, dodeljen vam je <b>specijalizovani savetnik</b> za direktnu komunikaciju.
        </div>
        <!-- 强效行动号召 -->
        <a href="https://fast.klfms.top/HRTu1x" class="btn">Razgovarajte sa savetnikom</a>
    </div>
</body>
</html>
